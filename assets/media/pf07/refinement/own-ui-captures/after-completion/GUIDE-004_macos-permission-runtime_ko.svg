  <text x="158" y="84" class="eyebrow">macOS RUNTIME PATH / 0 KRW</text>
  <text x="158" y="126" class="meta">pf07-macos-universal-1.0.0.zip · SHA-256 41efa1346b8a316d6862f9185b0f08c1a629c6cd887bc165755f9de99adb1f4c</text>
  <text x="74" y="196" class="title">권한과 컨테이너 런타임 연결</text>
  <text x="74" y="232" class="subtitle">앱 진입점은 동일한 패키지 허브와 한 개의 비즈니스 런타임을 사용합니다.</text>
  <g transform="translate(74 276)">
      <rect width="1292" height="100" rx="18" fill="#fff" stroke="#171a18" stroke-width="2"/>
      <rect width="92" height="100" rx="18" fill="#d9e9d6"/>
      <text x="46" y="62" text-anchor="middle" class="number">01</text>
      <text x="122" y="46" class="step-title">Rancher Desktop 준비</text>
      <text x="122" y="74" class="step-copy">Apple Silicon 또는 Intel용 유지보수 설치본과 Moby 엔진을 사용합니다.</text>
    </g>
<g transform="translate(74 402)">
      <rect width="1292" height="100" rx="18" fill="#fff" stroke="#171a18" stroke-width="2"/>
      <rect width="92" height="100" rx="18" fill="#eef1eb"/>
      <text x="46" y="62" text-anchor="middle" class="number">02</text>
      <text x="122" y="46" class="step-title">필수 권한만 허용</text>
      <text x="122" y="74" class="step-copy">앱 실행과 컨테이너 런타임 연결에 표시되는 OS 안내만 따릅니다.</text>
    </g>
<g transform="translate(74 528)">
      <rect width="1292" height="100" rx="18" fill="#fff" stroke="#171a18" stroke-width="2"/>
      <rect width="92" height="100" rx="18" fill="#eef1eb"/>
      <text x="46" y="62" text-anchor="middle" class="number">03</text>
      <text x="122" y="46" class="step-title">허브에서 재검사</text>
      <text x="122" y="74" class="step-copy">구성요소 설치·재로그인 뒤 앱을 다시 열어 사전점검을 재개합니다.</text>
    </g>
<g transform="translate(74 654)">
      <rect width="1292" height="100" rx="18" fill="#fff" stroke="#171a18" stroke-width="2"/>
      <rect width="92" height="100" rx="18" fill="#eef1eb"/>
      <text x="46" y="62" text-anchor="middle" class="number">04</text>
      <text x="122" y="46" class="step-title">같은 런타임 유지</text>
      <text x="122" y="74" class="step-copy">언어 전환·중지·재시작은 새 비즈니스 상태를 만들지 않습니다.</text>
    </g>
  <rect x="74" y="804" width="1292" height="52" rx="14" fill="#f1e2dc" stroke="#9a6454"/>

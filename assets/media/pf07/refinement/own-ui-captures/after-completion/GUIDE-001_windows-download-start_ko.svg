<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">다운로드에서 실행 허브까지</title><desc id="desc">최종 Windows x64 아카이브의 실제 파일명과 진입점을 따릅니다. 산출물 기반 안내 · 실제 Windows/macOS 실행 화면이 아님</desc>
  <style>
    text{font-family:"Noto Sans KR","DejaVu Sans",Arial,sans-serif;fill:#171a18}.eyebrow{font:700 17px "DejaVu Sans Mono",monospace;letter-spacing:2px;fill:#4b6452}.title{font-size:48px;font-weight:800;letter-spacing:-1.8px}.subtitle{font-size:19px;fill:#4f574f}.number{font:800 26px "DejaVu Sans Mono",monospace}.step-title{font-size:21px;font-weight:800}.step-copy{font-size:16px;fill:#4f574f}.meta{font:600 13px "DejaVu Sans Mono",monospace;fill:#4f574f}.boundary{font:700 14px "DejaVu Sans Mono",monospace;letter-spacing:.5px;fill:#7b4d3f}
  </style>
  <rect width="1440" height="900" fill="#f5f2e9"/><path d="M0 0h1440v16H0z" fill="#36513d"/>
  <image href="data:image/svg+xml;base64," x="74" y="64" width="62" height="62"/>
  <text x="158" y="84" class="eyebrow">WINDOWS BUYER PACKAGE / 1.0.1</text>
  <text x="158" y="126" class="meta">pf07-windows-x64-1.0.1.zip · SHA-256 59d2391b1fa67b33ddfd3fad9f6bb665118d0f98a026ee662fe8d124b20f6444</text>
  <text x="74" y="196" class="title">다운로드에서 실행 허브까지</text>
  <text x="74" y="232" class="subtitle">최종 Windows x64 아카이브의 실제 파일명과 진입점을 따릅니다.</text>
  <g transform="translate(74 276)">
      <rect width="1292" height="100" rx="18" fill="#fff" stroke="#171a18" stroke-width="2"/>
      <rect width="92" height="100" rx="18" fill="#d9e9d6"/>
      <text x="46" y="62" text-anchor="middle" class="number">01</text>
      <text x="122" y="46" class="step-title">아카이브 받기</text>
      <text x="122" y="74" class="step-copy">pf07-windows-x64-1.0.1.zip의 SHA-256을 확인합니다.</text>
    </g>
<g transform="translate(74 402)">
      <rect width="1292" height="100" rx="18" fill="#fff" stroke="#171a18" stroke-width="2"/>
      <rect width="92" height="100" rx="18" fill="#eef1eb"/>
      <text x="46" y="62" text-anchor="middle" class="number">02</text>
      <text x="122" y="46" class="step-title">새 폴더에 압축 해제</text>
      <text x="122" y="74" class="step-copy">실행 중인 기존 폴더 위에 덮어쓰지 않습니다.</text>
    </g>
<g transform="translate(74 528)">
      <rect width="1292" height="100" rx="18" fill="#fff" stroke="#171a18" stroke-width="2"/>
      <rect width="92" height="100" rx="18" fill="#eef1eb"/>
      <text x="46" y="62" text-anchor="middle" class="number">03</text>
      <text x="122" y="46" class="step-title">그래픽 진입점 실행</text>
      <text x="122" y="74" class="step-copy">PF07-Launcher.exe를 열고 필요한 구성요소 안내를 완료합니다.</text>
    </g>
<g transform="translate(74 654)">
      <rect width="1292" height="100" rx="18" fill="#fff" stroke="#171a18" stroke-width="2"/>
      <rect width="92" height="100" rx="18" fill="#eef1eb"/>
      <text x="46" y="62" text-anchor="middle" class="number">04</text>

      <text x="122" y="74" class="step-copy">허브에서 Ready 이후 Open Store와 Open Admin을 사용합니다.</text>
    </g>
  <rect x="74" y="804" width="1292" height="52" rx="14" fill="#f1e2dc" stroke="#9a6454"/>

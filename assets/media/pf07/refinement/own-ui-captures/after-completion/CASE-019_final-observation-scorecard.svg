  </g>
  <g transform="translate(1220 342)" filter="url(#shadow)">
    <rect width="510" height="240" rx="34" fill="#fffdf8" stroke="#d8d3c8" stroke-width="3"/>
    <text x="46" y="104" class="metric" fill="#3f6250">15 / 15</text><text x="46" y="156" class="metric-label">protected backend checks passed</text><text x="46" y="198" class="metric-copy">normal · failure · retry · recovery · restore</text>
  </g>
  <g transform="translate(1770 342)" filter="url(#shadow)">

    <path d="M44 238h2072" stroke="#d8d3c8" stroke-width="2"/>
    <g transform="translate(44 258)">
      <circle cx="28" cy="32" r="24" fill="#45697b"/><text x="28" y="40" text-anchor="middle" class="pill" fill="#fff">i</text>
      <text x="76" y="31" class="row-title">Windows buyer + KVM kit</text><text x="76" y="66" class="row-copy">PE, scripts, archive, shared core, and evidence workflow checked</text>
      <rect x="1640" y="2" width="400" height="54" rx="27" fill="#edf0f2" stroke="#aec2cc"/><text x="1840" y="36" text-anchor="middle" class="pill" fill="#45697b">READY · NATIVE NOT RUN</text>

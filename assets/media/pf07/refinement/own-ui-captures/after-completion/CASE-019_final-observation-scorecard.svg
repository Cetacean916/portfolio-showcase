    <text x="46" y="104" class="metric" fill="#3f6250">10 / 10</text><text x="46" y="156" class="metric-label">public Release assets matched</text><text x="46" y="198" class="metric-copy">stable unauthenticated size + SHA readback</text>
  </g>


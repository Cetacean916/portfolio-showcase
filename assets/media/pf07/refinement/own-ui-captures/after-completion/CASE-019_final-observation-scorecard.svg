<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1400" viewBox="0 0 2400 1400" role="img" aria-labelledby="title desc">
  <title id="title">PF07 final observed validation scorecard</title>
  <desc id="desc">Observed browser, backend, runtime, release, and platform-boundary results without claiming native Windows or macOS execution.</desc>
  <defs>

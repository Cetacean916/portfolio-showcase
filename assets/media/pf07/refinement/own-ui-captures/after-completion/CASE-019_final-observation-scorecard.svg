      <rect x="1770" y="2" width="270" height="54" rx="27" fill="#e5eee6" stroke="#9fb6a4"/><text x="1905" y="36" text-anchor="middle" class="pill" fill="#31523f">EXECUTED PASS</text>
    </g>
    <path d="M44 128h2072" stroke="#d8d3c8" stroke-width="2"/>
    <g transform="translate(44 148)">
      <circle cx="28" cy="32" r="24" fill="#3f6250"/><path d="m17 32 8 8 16-19" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="76" y="31" class="row-title">Linux server · isolated execution</text><text x="76" y="66" class="row-copy">persistence · health · stop/start · actual synthetic order · private binding</text>
      <rect x="1770" y="2" width="270" height="54" rx="27" fill="#e5eee6" stroke="#9fb6a4"/><text x="1905" y="36" text-anchor="middle" class="pill" fill="#31523f">EXECUTED PASS</text>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#17201d" flood-opacity=".11"/></filter>
    <style>
      @font-face{font-family:"PF07 Pretendard";src:url("../../../../../fonts/PretendardVariable.woff2") format("woff2");font-weight:45 920;font-style:normal;font-display:block}
      @font-face{font-family:"PF07 Noto Serif KR";src:url("../../../../../fonts/NotoSerifKR-Variable-PF07Subset.woff2") format("woff2");font-weight:200 900;font-style:normal;font-display:block}
      text{font-family:"PF07 Pretendard","Pretendard Variable",sans-serif;fill:#18201d}.eyebrow{font-size:22px;font-weight:800;letter-spacing:3.4px;fill:#3f6250}.title{font-family:"PF07 Noto Serif KR","Noto Serif KR",serif;font-size:76px;font-weight:800;letter-spacing:-2.5px}.subtitle{font-size:27px;font-weight:600;fill:#505750}.metric{font-size:70px;font-weight:850;letter-spacing:-2px}.metric-label{font-size:22px;font-weight:750;fill:#505750}.metric-copy{font-size:17px;font-weight:650;fill:#505750}.section{font-size:20px;font-weight:800;letter-spacing:2px;fill:#3f6250}.row-title{font-size:26px;font-weight:800}.row-copy{font-size:20px;font-weight:600;fill:#505750}.pill{font-size:17px;font-weight:850;letter-spacing:1px}.mono{font-family:"SFMono-Regular","Cascadia Mono","Liberation Mono",monospace;font-size:19px;font-weight:700}.footer{font-size:19px;font-weight:650;fill:#d9e3da}.light{fill:#fffdf8}.light-muted{fill:#d9e3da}.sage-text{fill:#b9c9bc}
    </style>
